[paths]
dataset_dir = dataset
videos_dir = videos
raw_frames_dir = raw_frames
output_dir = outputs
app_assets_models_dir = ../app/src/main/assets/models
base_model = yolo26n.pt

[training]
imgsz = 256
epochs = 180
batch = 16
patience = 25
workers = 4
device = auto
project = outputs/runs/detect
run_name = train
seed = 42
optimizer = AdamW
lr0 = 0.01
lrf = 0.01
close_mosaic = 10
single_cls = true

[adaptive]
enabled = true
min_epochs = 80
max_epochs = 320
small_dataset_threshold = 300
medium_dataset_threshold = 1200

[export]
half = true
simplify = true
dynamic = false
batch = 1
