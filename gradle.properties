# Project-wide Gradle settings

# Use AndroidX
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Daemon and parallel builds
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.workers.max=4
# G1GC for better GC throughput on large builds
org.gradle.jvmargs=-Xmx4096m -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Kotlin incremental compilation
kotlin.incremental=true
kotlin.caching.enabled=true
kotlin.parallel.tasks.in.project=true

# NDK settings - suppress verbose native output in release builds
# android.native.buildOutput is omitted to use AGP default (quiet output)
android.dependency.useConstraints=false
